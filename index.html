<!DOCTYPE html>

<title>Annaroz Design · Liens</title>

<style>
@font-face{font-family:'Archivo';src:url('assets/fonts/Archivo-300.woff2') format('woff2');font-weight:300;font-display:swap}
@font-face{font-family:'Archivo';src:url('assets/fonts/Archivo-400.woff2') format('woff2');font-weight:400;font-display:swap}
@font-face{font-family:'Archivo';src:url('assets/fonts/Archivo-600.woff2') format('woff2');font-weight:600;font-display:swap}
@font-face{font-family:'Archivo';src:url('assets/fonts/Archivo-700.woff2') format('woff2');font-weight:700;font-display:swap}
:root{--navy:#16213E;--encre:#0A101F;--creme:#F2EDE0;--or:#C49A4E;--or-clair:#F3D789;--txt:#E6E3D7;--dim:#98A0B4}
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(120% 90% at 50% 0%,#141F3A 0%,var(--encre) 60%);color:var(--txt);font-family:'Archivo',system-ui,sans-serif;min-height:100svh;display:flex;flex-direction:column;align-items:center;padding:52px 20px 40px}
.avatar{width:96px;height:96px;border-radius:50%;box-shadow:0 10px 40px rgba(0,0,0,.5)}
h1{margin-top:18px;font-size:21px;font-weight:700;color:var(--creme);letter-spacing:.14em}
h1 .slash{color:var(--or);font-weight:300;letter-spacing:.22em}
.tag{margin-top:10px;font-size:13.5px;color:var(--dim);text-align:center;max-width:36ch;line-height:1.55}
.tag b{color:var(--or-clair);font-weight:600}
.links{margin-top:36px;width:100%;max-width:420px;display:grid;gap:14px}
.link{display:block;text-align:center;text-decoration:none;font-size:16px;font-weight:600;color:var(--creme);border:1px solid rgba(196,154,78,.4);border-radius:999px;padding:16px 20px;transition:transform .15s ease,background .15s ease}
.link:hover{transform:translateY(-2px);background:rgba(196,154,78,.08)}
.link.main{background:linear-gradient(135deg,#f3d789,#C49A4E 55%,#8a6a2f);color:#151515;border:none}
.link small{display:block;font-weight:400;font-size:12px;color:inherit;opacity:.75;margin-top:2px}
footer{margin-top:auto;padding-top:44px;font-size:11px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase}
</style>
</head>
<body>
  <img class="avatar" src="assets/avatar.png" alt="Annaroz Design">
